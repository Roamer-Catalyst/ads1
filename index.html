<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <h1>✨ My Image Gallery</h1>

    <div class="gallery">
        <div class="gallery-item">
            <img src="https://picsum.photos/id/1015/600/400" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/id/1016/600/400" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/id/1018/600/400" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/id/1020/600/400" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/id/1024/600/400" alt="">
        </div>

        <div class="gallery-item">
            <img src="https://picsum.photos/id/1027/600/400" alt="">
        </div>
    </div>

</body>
</html>
